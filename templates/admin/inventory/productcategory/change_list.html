{% extends "admin/change_list.html" %} {% block content %}
<div style="display: flex; gap: 20px; min-height: 500px">
  <!-- 左侧：树形导航栏 -->
  <div
    style="
      width: 320px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      padding: 15px;
      border-radius: 4px;
      flex-shrink: 0;
    "
  >
    <h3
      style="
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 16px;
        color: #2c3e50;
        padding-bottom: 8px;
        border-bottom: 1px solid #dee2e6;
      "
    >
      📁 商品分类
    </h3>
    <div class="category-tree" style="max-height: 70vh; overflow-y: auto">
      {{ category_tree|safe }}
    </div>
  </div>

  <!-- 右侧：当前分类下的列表 -->
  <div style="flex: 1; min-width: 0">
    {% if current_path %}
    <div
      style="
        margin-bottom: 15px;
        padding: 8px 12px;
        background: #e8f0fe;
        border-left: 4px solid #79aec8;
        border-radius: 3px;
      "
    >
      <strong>当前位置：</strong> {{ current_path }}
    </div>
    {% endif %} {{ block.super }}
  </div>
</div>

{{ custom_js|safe }}

<style>
  .category-tree {
    font-size: 14px;
  }
  .tree-item {
    margin: 2px 0;
    white-space: nowrap;
  }
  .tree-item a {
    cursor: pointer;
    transition: all 0.2s;
    display: inline-block;
  }
  .tree-item a:hover {
    background: #e9ecef !important;
  }
  .tree-item.active a {
    background: #e9ecef !important;
    color: #0d6efd !important;
    font-weight: bold !important;
  }
  .tree-toggle {
    cursor: pointer;
    color: #6c757d;
    font-size: 12px;
    user-select: none;
  }
  .tree-toggle:hover {
    color: #0d6efd;
  }
  .tree-children {
    margin-left: 20px;
  }
  .tree-prefix {
    font-family: monospace;
  }
  .tree-folder-icon {
    margin-right: 4px;
  }
  #result_list tbody tr {
    cursor: pointer;
  }
  #result_list tbody tr:hover {
    background: #f8f9fa;
  }
</style>
{% endblock %}
