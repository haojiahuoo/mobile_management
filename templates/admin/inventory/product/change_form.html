<style>
    /* Excel 风格样式 */
    table input, table select, table textarea {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
        box-sizing: border-box;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.2s;
    }
    
    table input:focus, table select:focus, table textarea:focus {
        border-color: #79aec8;
        outline: none;
        box-shadow: 0 0 0 2px rgba(121,174,200,0.2);
    }
    
    /* 数字字段右对齐 */
    td input[type="number"] {
        text-align: right;
    }
    
    /* 复选框样式 */
    td input[type="checkbox"] {
        width: auto;
        margin: 0;
        transform: scale(1.2);
    }
    
    /* 错误消息样式 */
    .error-message {
        color: #ba2121;
        font-size: 11px;
        margin-top: 4px;
        padding: 2px 4px;
        background: #fff2f2;
        border-radius: 3px;
    }
    
    /* 帮助文本样式 */
    .help-text {
        color: #666;
        font-size: 11px;
        margin-top: 3px;
        font-style: italic;
    }
    
    /* 表格行悬停效果 */
    tbody tr:hover {
        background: #f0f7ff !important;
    }
    
    /* 响应式设计 */
    @media (max-width: 1200px) {
        .excel-container {
            overflow-x: auto;
        }
        
        table {
            min-width: 900px;
        }
    }
    
    /* 分组标题图标 */
    th[colspan] {
        background: linear-gradient(135deg, #e8f0f7 0%, #d9e4ef 100%);
    }
    
    /* 只读字段样式 */
    input[readonly] {
        background-color: #f5f5f5;
        cursor: not-allowed;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 获取默认分类信息
        const defaultCategoryId = document.getElementById('default_category_id').value;
        const defaultCategoryName = document.getElementById('default_category_name').value;
        
        // 自动生成编号的函数
        function generateCode(rowIndex) {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 1000);
            return `PROD-${timestamp}-${random}-${rowIndex}`;
        }
        
        // 初始化所有编号
        for (let i = 1; i <= 5; i++) {
            const codeField = document.getElementById(`id_code_${i}`);
            if (codeField && codeField.value === '自动生成') {
                codeField.value = generateCode(i);
            }
        }
        
        // 添加键盘快捷键支持（Ctrl+Enter 保存）
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                const saveButton = document.querySelector('input[name="_save"]');
                if (saveButton) saveButton.click();
            }
        });
    });
</script>
