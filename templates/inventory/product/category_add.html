<!-- templates/inventory/product/category_add.html -->
{% extends "admin/base_site.html" %}

{% block title %}添加分类{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 20px auto;
    }
    .form-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 25px;
    }
    .form-title {
        font-size: 20px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #e9ecef;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #2c3e50;
    }
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }
    .form-group input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
    }
    .parent-info {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
        border-left: 3px solid #3498db;
    }
    .btn-group {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
    }
    .btn-cancel {
        background: #6c757d;
        color: white;
        text-decoration: none;
        padding: 10px 24px;
        border-radius: 5px;
        display: inline-block;
    }
    .btn-submit {
        background: #28a745;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }
    .btn-submit:hover, .btn-cancel:hover {
        opacity: 0.9;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <h1 class="form-title">
            📁 添加{% if parent %}{{ parent.name }}{% else %}顶级{% endif %}分类
        </h1>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="parent_id" value="{{ parent.id|default:'' }}">
            
            <div class="form-group">
                <label>分类名称：</label>
                <input type="text" name="name" required placeholder="请输入分类名称">
            </div>
            
            {% if parent %}
            <div class="parent-info">
                <span style="color: #666;">上级分类：</span>
                <strong style="color: #2c3e50;">{{ parent.get_full_name }}</strong>
                <br>
                <span style="color: #666; font-size: 12px;">分类编码：</span>
                <span style="color: #3498db;">{{ parent.code }}</span>
            </div>
            {% endif %}
            
            <div class="btn-group">
                <a href="{% url 'admin:category_list' %}{% if parent %}{{ parent.id }}/{% endif %}" class="btn-cancel">取消</a>
                <button type="submit" class="btn-submit">保存分类</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
